name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from mogchat.lua
        id: version
        run: |
          version=$(grep "addon.version" mogchat.lua | head -1 | sed "s/.*'\(.*\)'.*/\1/")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          mkdir -p mogchat
          cp -r lib/ sounds/ mogchat.lua mogchat/
          zip -r mogchat-${{ steps.version.outputs.version }}.zip mogchat/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: MogChat v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: mogchat-${{ steps.version.outputs.version }}.zip
